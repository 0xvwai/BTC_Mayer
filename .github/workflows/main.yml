name: BTC-Monitor
on:
  schedule:
    # 這裡的 0,12 代表 UTC 的 00:00 和 12:00
    # 對應紐約/紐澤西時間為 8:00 PM 和 8:00 AM
    - cron: '0 0,12 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install ccxt pandas requests
      - env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py
